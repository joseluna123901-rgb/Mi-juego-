<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Controls</title>
    <style>
        body { margin: 0; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; justify-content: space-between; width: 80%; }
        .button { background-color: #007BFF; color: white; border: none; border-radius: 5px; padding: 15px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <script>
        function moveLeft() { console.log('Moving left'); }
        function moveRight() { console.log('Moving right'); }
        function jump() { console.log('Jumping'); }
        function shoot() { console.log('Shooting'); }
    </script>
    <div class="controls">
        <button class="button" onclick="moveLeft()">LEFT</button>
        <button class="button" onclick="moveRight()">RIGHT</button>
        <button class="button" onclick="jump()">JUMP</button>
        <button class="button" onclick="shoot()">SHOOT</button>
    </div>
</body>
</html>
