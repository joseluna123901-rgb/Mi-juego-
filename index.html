<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Platform Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; background: #87CEEB; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Player {
        constructor() {
            this.width = 50;
            this.height = 50;
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.speed = 5;
            this.color = 'blue';
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
        move() {
            window.addEventListener('touchstart', (e) => this.touchControls(e));
            window.addEventListener('touchend', () => this.stopMoving());
        }
        touchControls(e) {
            const touch = e.touches[0];
            if (touch.clientX > canvas.width / 2) {
                this.x += this.speed;
            } else {
                this.x -= this.speed;
            }
            this.y -= this.speed; // Simulating jumping
        }
        stopMoving() {
            this.y += 0; // Stopping vertical movement
        }
    }

    const player = new Player();

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        player.draw();
        requestAnimationFrame(update);
    }

    player.move();
    update();
    </script>
</body>
</html>
